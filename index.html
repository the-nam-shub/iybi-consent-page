<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Access approved · If You Build It</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f6f8fa;
      color: #1a1f27;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e2e6ea;
      border-radius: 12px;
      padding: 48px 44px;
      max-width: 480px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(20, 30, 40, 0.06);
    }
    .check {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #e7f6ec;
      color: #1e7e3e;
      font-size: 30px;
      line-height: 56px;
      margin: 0 auto 20px;
    }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 10px; }
    p { font-size: 15px; line-height: 1.55; color: #4a5361; }
    p + p { margin-top: 10px; }
    .brand {
      margin-top: 28px;
      font-size: 13px;
      letter-spacing: 0.04em;
      color: #8a93a0;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="check">&#10003;</div>
    <h1>Access approved</h1>
    <p>The email import app is now connected to your organization.</p>
    <p>You can close this tab and continue with the remaining setup steps.</p>
    <div class="brand">IF YOU BUILD IT</div>
  </main>
</body>
</html>
